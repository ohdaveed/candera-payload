<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:ital,opsz,wght@0,9..40,300..600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; color: #141412; padding: 30px 36px; width: 700px; }
  .item { display: flex; align-items: baseline; gap: 20px; padding: 11px 0; border-bottom: 1px solid rgba(218,204,184,0.4); }
  .item:last-child { border-bottom: none; }
  .meta { flex: 0 0 116px; font-family: "DM Sans"; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.16em; color: #dacbb8; }
  .fr { font-family: "Fraunces"; font-optical-sizing: auto; font-style: italic; font-weight: 400; letter-spacing: -0.01em; line-height: 1; }
  .sans { font-family: "DM Sans"; font-weight: 400; line-height: 1; }
  .eb { font-family: "DM Sans"; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; color: #dd7d52; }
</style>
</head>
<body>
  <div class="item"><span class="meta">Hero · 116px</span><span class="fr" style="font-size:58px">Candera</span></div>
  <div class="item"><span class="meta">Display · 48px</span><span class="fr" style="font-size:40px">Rooted in Earth.</span></div>
  <div class="item"><span class="meta">Page · 31px</span><span class="fr" style="font-size:31px">Meet the Maker</span></div>
  <div class="item"><span class="meta">Section · 25px</span><span class="sans" style="font-size:25px;font-weight:500">Current Batch</span></div>
  <div class="item"><span class="meta">Body · 16px</span><span class="sans" style="font-size:16px;font-weight:300;color:#3a3a36">A scent for the unhurried.</span></div>
  <div class="item"><span class="meta">Label · 13px</span><span class="sans" style="font-size:13px;color:#7a8174">Vessel 001 · 50 hours</span></div>
  <div class="item"><span class="meta">Eyebrow · 10px</span><span class="eb" style="font-size:10px">Hand-Poured in the Studio</span></div>
</body>
</html>
