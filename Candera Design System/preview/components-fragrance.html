<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #fff; padding: 30px 36px; width: 700px; font-family: "DM Sans"; }
  .kick { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: #dacbb8; margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: #4a4a45; }
  .grid > div { padding: 0 14px; }
  .grid > div:not(:last-child) { border-right: 1px solid #e2ddd6; }
  .grid > div:first-child { padding-left: 0; }
  .tier { color: #dd7d52; display: block; margin-bottom: 6px; }
  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; padding-top: 16px; border-top: 1px solid #e2ddd6; }
  .clock { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: #7a8174; }
  .atm { font-family: "EB Garamond"; font-style: italic; font-size: 16px; color: rgba(221,125,82,0.7); }
</style>
</head>
<body>
  <div class="kick">Fragrance Profile</div>
  <div class="grid">
    <div><span class="tier">Top</span>Sea Breeze</div>
    <div><span class="tier">Heart</span>Driftwood</div>
    <div><span class="tier">Base</span>Salt Air</div>
  </div>
  <div class="foot">
    <span class="clock">◷ 50 Hours</span>
    <span class="atm">Coastal &amp; Airy</span>
  </div>
</body>
</html>
