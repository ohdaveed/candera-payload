<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; padding: 28px 30px; width: 700px; font-family: "DM Sans"; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border: 1px solid rgba(218,204,184,0.5); border-radius: 2px; overflow: hidden; }
  .chip { height: 76px; }
  .cap { padding: 9px 10px; background: #fff; }
  .name { font-size: 11px; font-weight: 600; color: #141412; letter-spacing: 0.02em; }
  .hex { font-size: 10px; color: #7a8174; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#f5f2ed"></div><div class="cap"><div class="name">Vellum</div><div class="hex">#F5F2ED</div></div></div>
    <div class="sw"><div class="chip" style="background:#d8d5cc"></div><div class="cap"><div class="name">Field</div><div class="hex">#D8D5CC</div></div></div>
    <div class="sw"><div class="chip" style="background:#e2ddd6"></div><div class="cap"><div class="name">Ash</div><div class="hex">#E2DDD6</div></div></div>
    <div class="sw"><div class="chip" style="background:#dacbb8"></div><div class="cap"><div class="name">Stone</div><div class="hex">#DACBB8</div></div></div>
  </div>
</body>
</html>
