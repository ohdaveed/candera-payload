<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; padding: 24px 28px; width: 700px; font-family: "DM Sans"; }
  .legend { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: #dacbb8; margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .ph { aspect-ratio: 4/5; overflow: hidden; background: #e2ddd6; position: relative; }
  .ph img { width: 100%; height: 100%; object-fit: cover; }
  .ph span { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 9px 7px; font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #fff; background: linear-gradient(transparent, rgba(20,20,18,0.65)); }
</style>
</head>
<body>
  <div class="legend">Naturalistic · warm daylight · botanical handcraft · bright → moody range</div>
  <div class="grid">
    <div class="ph"><img src="../assets/images/seashell-garden.jpg" alt=""><span>Bright &amp; Airy</span></div>
    <div class="ph"><img src="../assets/images/meadowlight-botanical.jpg" alt=""><span>Fresh</span></div>
    <div class="ph"><img src="../assets/images/ever-after-glow.jpg" alt=""><span>Romantic</span></div>
    <div class="ph"><img src="../assets/images/crimson-noir.jpg" alt=""><span>Moody</span></div>
  </div>
</body>
</html>
