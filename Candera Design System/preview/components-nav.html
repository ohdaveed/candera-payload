<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; width: 700px; font-family: "DM Sans"; }
  .bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 20px 30px; background: rgba(255,255,255,0.95); border-bottom: 1px solid #f0ede7; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
  nav { display: flex; gap: 26px; }
  nav a { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: #7a8174; text-decoration: none; }
  nav a.active { color: #141412; border-bottom: 1px solid #141412; padding-bottom: 3px; }
  nav a.quiz { color: #dd7d52; display: flex; align-items: center; gap: 5px; }
  .logo { font-family: "Fraunces"; font-weight: 700; font-size: 24px; letter-spacing: -0.02em; color: #141412; text-align: center; }
  .right { display: flex; justify-content: flex-end; align-items: center; gap: 18px; }
  .shop { background: #141412; color: #fff; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; padding: 11px 20px; }
  .bag { color: #7a8174; }
  .dark { background: #141412; border-bottom-color: rgba(178,140,156,0.12); }
  .dark nav a { color: rgba(178,140,156,0.8); }
  .dark .logo { color: #fff; }
  .dark .bag { color: rgba(178,140,156,0.8); }
</style>
</head>
<body>
  <div class="bar">
    <nav><a class="active">Collection</a><a>The Craft</a><a class="quiz">✦ Scent Quiz</a></nav>
    <div class="logo">CANDERA</div>
    <div class="right"><span class="shop">Shop the Batch</span><svg class="bag" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
  </div>
  <div class="bar dark">
    <nav><a class="active" style="color:#b28c9c;border-color:#b28c9c">Collection</a><a>The Craft</a><a class="quiz">✦ Scent Quiz</a></nav>
    <div class="logo">CANDERA</div>
    <div class="right"><svg class="bag" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
  </div>
</body>
</html>
