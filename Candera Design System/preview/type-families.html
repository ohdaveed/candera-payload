<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300..600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; color: #141412; padding: 32px 36px; width: 700px; }
  .row { display: grid; grid-template-columns: 88px 1fr; gap: 28px; align-items: baseline; padding: 18px 0; border-bottom: 1px solid rgba(218,204,184,0.4); }
  .row:last-child { border-bottom: none; }
  .tag { font-family: "DM Sans"; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: #7a8174; }
  .tag small { display: block; color: #dacbb8; letter-spacing: 0.15em; margin-top: 4px; }
  .fraunces { font-family: "Fraunces"; font-optical-sizing: auto; font-style: italic; font-weight: 400; font-size: 44px; line-height: 1; letter-spacing: -0.01em; }
  .cormorant { font-family: "EB Garamond"; font-style: italic; font-weight: 400; font-size: 30px; line-height: 1.1; color: #7a8174; }
  .dmsans { font-family: "DM Sans"; font-weight: 300; font-size: 21px; }
  .dmsans b { font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="tag">Display<small>Fraunces</small></div>
    <div class="fraunces">An invitation to slow down.</div>
  </div>
  <div class="row">
    <div class="tag">Editorial<small>EB Garamond</small></div>
    <div class="cormorant">A practice in coastal stillness.</div>
  </div>
  <div class="row">
    <div class="tag">Body / UI<small>DM Sans</small></div>
    <div class="dmsans">Hand-poured in <b>numbered vessels</b> · 0123456789</div>
  </div>
</body>
</html>
