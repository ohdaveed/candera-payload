<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; padding: 28px 34px; width: 700px; font-family: "DM Sans"; }
  .legend { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.22em; color: #dacbb8; margin-bottom: 18px; }
  .legend b { color: #7a8174; font-weight: 600; }
  .row { display: flex; align-items: center; gap: 16px; margin-bottom: 9px; }
  .bar { height: 18px; background: #dd7d52; border-radius: 1px; }
  .lab { font-size: 11px; color: #141412; font-variant-numeric: tabular-nums; width: 64px; }
  .lab span { color: #dacbb8; }
</style>
</head>
<body>
  <div class="legend">8px base unit · <b>section rhythm ≥ 96px</b></div>
  <div class="row"><div class="bar" style="width:8px"></div><div class="lab">8 <span>· xs</span></div></div>
  <div class="row"><div class="bar" style="width:16px"></div><div class="lab">16 <span>· sm</span></div></div>
  <div class="row"><div class="bar" style="width:24px"></div><div class="lab">24 <span>· md</span></div></div>
  <div class="row"><div class="bar" style="width:32px"></div><div class="lab">32 <span>· lg</span></div></div>
  <div class="row"><div class="bar" style="width:48px"></div><div class="lab">48 <span>· xl</span></div></div>
  <div class="row"><div class="bar" style="width:64px"></div><div class="lab">64 <span>· 2xl</span></div></div>
  <div class="row"><div class="bar" style="width:96px"></div><div class="lab">96 <span>· section</span></div></div>
  <div class="row"><div class="bar" style="width:128px"></div><div class="lab">128 <span>· hero</span></div></div>
</body>
</html>
