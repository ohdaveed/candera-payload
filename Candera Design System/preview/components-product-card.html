<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #fff; padding: 26px 30px; width: 700px; font-family: "DM Sans"; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  .card { display: flex; flex-direction: column; gap: 16px; }
  .photo { position: relative; aspect-ratio: 4/5; overflow: hidden; background: #f0ede7; box-shadow: 0 1px 2px rgba(20,20,18,0.06); }
  .photo img { width: 100%; height: 100%; object-fit: cover; }
  .tags { position: absolute; left: 12px; top: 12px; display: flex; flex-direction: column; gap: 7px; align-items: flex-start; }
  .t1 { background: rgba(255,255,255,0.9); padding: 4px 9px; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; }
  .t2 { background: rgba(20,20,18,0.8); color: #fff; padding: 3px 9px; font-size: 7px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.16em; }
  .titlerow { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e2ddd6; padding-bottom: 12px; }
  .name { font-family: "Fraunces"; font-style: italic; font-size: 23px; line-height: 1.05; color: #141412; }
  .price { font-size: 13px; font-weight: 300; letter-spacing: 0.1em; color: #dacbb8; }
  .notes { font-size: 11px; color: #7a8174; line-height: 1.6; }
</style>
</head>
<body>
  <div class="row">
    <div class="card">
      <div class="photo">
        <img src="../assets/images/seashell-garden.jpg" alt="Seashell Garden Glow">
        <div class="tags"><span class="t1">Bestseller</span><span class="t2">Batch 001</span></div>
      </div>
      <div class="titlerow"><span class="name">Seashell Garden Glow</span><span class="price">$38.00</span></div>
      <div class="notes">Sea breeze · Driftwood · Salt air</div>
    </div>
    <div class="card">
      <div class="photo">
        <img src="../assets/images/crimson-noir.jpg" alt="Crimson Noir">
        <div class="tags"><span class="t1" style="background:#dd7d52;color:#fff">Limited Batch</span><span class="t2">Batch 003</span></div>
      </div>
      <div class="titlerow"><span class="name">Crimson Noir</span><span class="price">$38.00</span></div>
      <div class="notes">Merlot · Dark berry · Vetiver</div>
    </div>
  </div>
</body>
</html>
