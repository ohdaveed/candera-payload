<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; padding: 30px 34px; width: 700px; font-family: "DM Sans"; }
  .grp { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .grp:last-child { margin-bottom: 0; }
  .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: #dacbb8; width: 78px; }
  .tag { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; padding: 5px 11px; border-radius: 2px; }
  .ember { background: #dd7d52; color: #fff; }
  .obsidian { background: #141412; color: #fff; }
  .lav { background: #b28c9c; color: #fff; }
  .glass { background: rgba(255,255,255,0.9); color: #141412; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .batch { background: rgba(20,20,18,0.8); color: #fff; font-weight: 500; font-size: 8px; }
  .text { color: #7a8174; padding: 0; letter-spacing: 0.2em; }
</style>
</head>
<body>
  <div class="grp"><span class="lbl">Product</span>
    <span class="tag ember">Limited Batch</span>
    <span class="tag obsidian">Bestseller</span>
    <span class="tag lav">New Release</span>
  </div>
  <div class="grp"><span class="lbl">On image</span>
    <span class="tag glass">Bestseller</span>
    <span class="tag batch">Batch 001</span>
  </div>
  <div class="grp"><span class="lbl">Inline</span>
    <span class="tag text">Verified Ritualist</span>
    <span class="tag text">Repeat Collector</span>
  </div>
</body>
</html>
