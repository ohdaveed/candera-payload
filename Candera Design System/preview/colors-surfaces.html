<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz@1,9..144&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; padding: 26px 30px; width: 700px; font-family: "DM Sans"; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { border-radius: 2px; border: 1px solid rgba(218,204,184,0.5); padding: 20px 22px; height: 132px; display: flex; flex-direction: column; justify-content: space-between; }
  .kick { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.28em; }
  .ttl { font-family: "Fraunces"; font-style: italic; font-size: 26px; line-height: 1; }
  .meta { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.12em; }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel" style="background:#ffffff">
      <div class="kick" style="color:#dd7d52">The Current Batch</div>
      <div class="ttl" style="color:#141412">Light surface</div>
      <div class="meta" style="color:#7a8174">White / Vellum · primary content</div>
    </div>
    <div class="panel" style="background:#141412;border-color:rgba(178,140,156,0.25)">
      <div class="kick" style="color:#b28c9c">The Evening Practice</div>
      <div class="ttl" style="color:#b28c9c">Nocturnal</div>
      <div class="meta" style="color:rgba(245,242,237,0.5)">Obsidian ground · Dusk Rose type</div>
    </div>
  </div>
</body>
</html>
