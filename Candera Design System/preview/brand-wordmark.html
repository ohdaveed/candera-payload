<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400&family=DM+Sans:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #f5f2ed; padding: 0; width: 700px; font-family: "DM Sans"; }
  .row { display: flex; }
  .cell { flex: 1; padding: 34px 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .cell.dark { background: #141412; }
  .wm { font-family: "Fraunces"; font-weight: 700; letter-spacing: -0.02em; }
  .lock { font-family: "Fraunces"; font-style: italic; font-weight: 400; }
  .cap { font-size: 9px; text-transform: uppercase; letter-spacing: 0.22em; color: #dacbb8; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell">
      <div class="wm" style="font-size:42px;color:#141412">CANDERA</div>
      <div class="lock" style="font-size:15px;color:#b28c9c">the studio</div>
      <div class="cap">Primary · Obsidian on Vellum</div>
    </div>
    <div class="cell dark">
      <div class="wm" style="font-size:42px;color:#f5f2ed">CANDERA</div>
      <div class="lock" style="font-size:15px;color:#b28c9c">the studio</div>
      <div class="cap" style="color:#7a8174">Nocturnal · Vellum on Obsidian</div>
    </div>
  </div>
</body>
</html>
