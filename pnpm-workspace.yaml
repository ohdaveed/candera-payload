nodeLinker: hoisted

# Exempt specific trusted deps from pnpm v11's default 24h supply-chain
# cooldown (minimumReleaseAge: 1440). Dependabot bumps these on the day they
# publish, which otherwise blocks every `pnpm install` (local, CI, Vercel)
# until the version is 24h old. The cooldown stays enforced for all other deps.
minimumReleaseAgeExclude:
  - lucide-react

allowBuilds:
  '@sentry/cli': true
  bufferutil: false
  esbuild: true
  sharp: true
  unrs-resolver: true

overrides:
  postcss: ^8.5.15
  dompurify: ^3.4.7
  esbuild: ^0.28.0
  vite: 'catalog:'
  vitest: 'catalog:'
  # Pin tsx to the last release before the 4.21.1 regression that breaks
  # `payload migrate:create` on Node 24 (tsx's CJS load hook mangles
  # `require('node:crypto')` from drizzle-kit/api → ENOENT
  # 'node:crypto?tsx-namespace=…'). Payload itself depends on tsx@4.22.4, so a
  # global override is required to force its nested copy down too. 4.21.0 is the
  # newest version that loads drizzle-kit/api cleanly; satisfies Vite+'s ^4.8.1.
  tsx: 4.21.0
  # Security: bump known-vulnerable transitive ranges to their patched releases
  # within the same major (CVE remediation — see docs/client-readiness.md).
  undici@<6.27.0: '>=6.27.0 <7'
  undici@>=7.0.0 <7.28.0: '>=7.28.0 <8'
  nodemailer@<9.0.1: '>=9.0.1'
catalog:
  # Pinned to a mutually-compatible Vite+ set (off @latest, which drifted:
  # vite-plus/-core reached 0.2.x while @voidzero-dev/vite-plus-test never
  # published 0.2.x, breaking `vp test`). Per the vite-plus README, pin `vitest`
  # to the real Vitest the CLI bundles (4.1.9) — not the obsolete -test alias —
  # so the project and `vp test` share one Vitest copy.
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vitest: 4.1.9
  vite-plus: 0.2.1
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
auditConfig:
  # Suppressed advisories — re-evaluate when a remediation path opens up.
  # Both are the same root cause: `vite` is aliased to the Vite+ fork
  # (catalog: npm:@voidzero-dev/vite-plus-core), whose newest release (0.2.1)
  # still self-reports as vite 7.3.3 and has no build on the patched vite
  # >=7.3.5 yet. Both CVEs are Windows-only; vite is dev/test-only (never in
  # the production bundle) and we build/run on Linux — so exposure is nil here.
  # Lift these once vite-plus-core ships a vite >=7.3.5 base, then bump the catalog.
  ignoreGhsas:
    - GHSA-fx2h-pf6j-xcff # vite: server.fs.deny bypass on Windows alternate paths (high)
    - GHSA-v6wh-96g9-6wx3 # vite/launch-editor: NTLMv2 hash disclosure via Windows UNC paths (moderate)
