name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: candera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Non-Neon host -> standard postgres adapter (see src/utilities/databaseAdapter.ts)
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/candera_test
      POSTGRES_URL: postgres://postgres:postgres@localhost:5432/candera_test
      PAYLOAD_SECRET: ci-test-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
      PREVIEW_SECRET: ci-preview-secret
      ETSY_SHOP_ID: '0'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
      - name: Run migrations
        run: pnpm payload migrate
      - name: Integration tests
        # NOT `pnpm test:int` — that script wraps the command in pass-cli, which
        # isn't installed/authenticated in CI; env vars come from the job instead.
        run: pnpm test:int:ci
      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: candera_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Non-Neon host -> standard postgres adapter (see src/utilities/databaseAdapter.ts)
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/candera_e2e
      POSTGRES_URL: postgres://postgres:postgres@localhost:5432/candera_e2e
      PAYLOAD_SECRET: ci-test-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
      PREVIEW_SECRET: ci-preview-secret
      ETSY_SHOP_ID: '0'
      # seed:admin refuses a default/missing password. These match the
      # TEST_ADMIN_* defaults in tests/helpers/seedUser.ts so login() works
      # without needing to also override those.
      SEED_ADMIN_EMAIL: dev@candera.com
      SEED_ADMIN_PASSWORD: test1234

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run migrations
        run: pnpm payload migrate
      - name: Seed admin user
        # Direct tsx invocation, not `pnpm seed:admin` — that script wraps
        # pass-cli, which isn't installed/authenticated in CI.
        run: pnpm exec tsx scripts/seed.ts admin
      - name: Seed content
        run: pnpm exec tsx scripts/seed.ts db
      - name: E2E tests
        # NOT `pnpm test:e2e` — same pass-cli reason as `test:int:ci` above.
        # playwright.config.ts starts `next dev` itself via `webServer`, so no
        # separate server-start step is needed here.
        run: pnpm test:e2e:ci
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
