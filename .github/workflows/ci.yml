name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: candera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Non-Neon host -> standard postgres adapter (see src/utilities/databaseAdapter.ts)
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/candera_test
      POSTGRES_URL: postgres://postgres:postgres@localhost:5432/candera_test
      PAYLOAD_SECRET: ci-test-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
      PREVIEW_SECRET: ci-preview-secret
      ETSY_SHOP_ID: '0'

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Run migrations
        run: pnpm payload migrate
      - name: Integration tests
        # NOT `pnpm test:int` — that script wraps the command in pass-cli, which
        # isn't installed/authenticated in CI; env vars come from the job instead.
        run: pnpm test:int:ci
      - name: Build
        run: pnpm build
