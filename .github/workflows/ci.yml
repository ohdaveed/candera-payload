name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install pass-cli
        run: |
          curl -fsSL https://proton.me/download/pass-cli/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq zsh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI (migrate + build)
        env:
          PROTON_PASS_PERSONAL_ACCESS_TOKEN: ${{ secrets.PROTON_PASS_PERSONAL_ACCESS_TOKEN }}
          PROTON_PASS_SHARE_ID: ${{ secrets.PROTON_PASS_SHARE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.POSTGRES_URL }}
          POSTGRES_URL: ${{ secrets.DATABASE_URL || secrets.POSTGRES_URL }}
        run: |
          if [ -n "$PROTON_PASS_PERSONAL_ACCESS_TOKEN" ]; then
            pass-cli login
            if [ -z "$PROTON_PASS_SHARE_ID" ]; then
              echo "PROTON_PASS_SHARE_ID secret is not set" >&2
              exit 1
            fi
            ./scripts/generate-pass-env.sh --share-id "$PROTON_PASS_SHARE_ID" --out .env.ci
            pass-cli run --env-file .env.ci -- pnpm run ci
          else
            pnpm run ci
          fi
