name: Secret Scanning (Gitleaks)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly full-history scan

jobs:
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          # Fetch the full history so that the scheduled scan and history-aware
          # runs can detect secrets committed in the past (not just the diff).
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for organisation-private repos when
          # using the commercial gitleaks-action. For public / personal repos
          # the free tier applies automatically.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
